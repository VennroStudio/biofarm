name: biofarm

services:
  nginx:
    container_name: biofarm-nginx
    build:
      context: docker
      dockerfile: development/nginx/Dockerfile
    ports:
      - "${HTTP_PORT:-8088}:80"
    volumes:
      - ./:/app
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  php-fpm:
    container_name: biofarm-php-fpm
    build:
      context: docker
      dockerfile: development/php-fpm/Dockerfile
    env_file: .env
    volumes:
      - ./:/app
    networks:
      - proxy

  php-cli:
    container_name: biofarm-php-cli
    build:
      context: docker
      dockerfile: development/php-cli/Dockerfile
    env_file: .env
    volumes:
      - ./:/app
    networks:
      - proxy

networks:
  proxy:
    external: true
