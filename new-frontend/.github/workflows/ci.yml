name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  php:
    name: PHP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, mbstring, xml, xmlwriter
          tools: composer:v2
          coverage: none

      - name: Validate Composer
        run: composer validate --strict --no-check-publish

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHP checks
        run: composer check

      - name: Audit Composer dependencies
        run: composer audit --locked

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run frontend checks
        run: npm run check

      - name: Audit Node dependencies
        run: npm audit --audit-level=high

  docker:
    name: Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production nginx image
        run: docker build -f docker/production/nginx/Dockerfile -t slim-frontend-nginx:ci .

      - name: Verify production nginx assets
        run: |
          docker run --rm slim-frontend-nginx:ci sh -lc 'test -f /app/public/build/.vite/manifest.json && test -n "$(find /app/public/build/assets -name "*.js" -print -quit)" && test -n "$(find /app/public/build/assets -name "*.css" -print -quit)"'

      - name: Build production php-fpm image
        run: docker build -f docker/production/php-fpm/Dockerfile -t slim-frontend-php-fpm:ci .

      - name: Verify production php-fpm assets
        run: |
          docker run --rm slim-frontend-php-fpm:ci sh -lc 'test -f /app/public/build/.vite/manifest.json && test -n "$(find /app/public/build/assets -name "*.js" -print -quit)" && test -n "$(find /app/public/build/assets -name "*.css" -print -quit)"'

      - name: Build production php-cli image
        run: docker build -f docker/production/php-cli/Dockerfile -t slim-frontend-php-cli:ci .

      - name: Verify production php-cli assets
        run: |
          docker run --rm slim-frontend-php-cli:ci sh -lc 'test -f /app/public/build/.vite/manifest.json && test -n "$(find /app/public/build/assets -name "*.js" -print -quit)" && test -n "$(find /app/public/build/assets -name "*.css" -print -quit)"'
