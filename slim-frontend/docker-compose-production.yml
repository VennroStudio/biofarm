name: slim-frontend

services:
  nginx:
    image: ${REGISTRY}/slim-frontend-nginx:${IMAGE_TAG}
    container_name: slim-frontend-nginx
    restart: unless-stopped
    depends_on:
      - php-fpm
    networks:
      - proxy

  php-fpm:
    image: ${REGISTRY}/slim-frontend-php-fpm:${IMAGE_TAG}
    container_name: slim-frontend-php-fpm
    restart: unless-stopped
    env_file: .env
    networks:
      - proxy

  php-cli:
    image: ${REGISTRY}/slim-frontend-php-cli:${IMAGE_TAG}
    container_name: slim-frontend-php-cli
    restart: unless-stopped
    env_file: .env
    networks:
      - proxy

networks:
  proxy:
    external: true
